<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>openTagCloud — RTL example</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 2rem;
      }
      main {
        max-width: 720px;
        margin: 0 auto;
      }
      otc-tag-cloud {
        height: 320px;
        --otc-color: #334155;
        --otc-hover-color: #2563eb;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>openTagCloud — RTL</h1>
      <p>
        سحابة وسوم بالعربية — the layout is positioned with CSS logical
        properties, so it mirrors automatically under
        <code>dir="rtl"</code>.
      </p>
      <otc-tag-cloud
        min-px="14"
        max-px="44"
        items='[
          { "label": "برمجة", "weight": 95, "href": "#" },
          { "label": "جافاسكريبت", "weight": 88, "href": "#" },
          { "label": "بايثون", "weight": 82 },
          { "label": "تعلم الآلة", "weight": 70 },
          { "label": "قواعد البيانات", "weight": 60 },
          { "label": "شبكات", "weight": 55 },
          { "label": "أمن المعلومات", "weight": 48 },
          { "label": "خوارزميات", "weight": 42 },
          { "label": "واجهات", "weight": 35 },
          { "label": "سحابة", "weight": 30 },
          { "label": "اختبار", "weight": 22 },
          { "label": "توثيق", "weight": 15 }
        ]'
      ></otc-tag-cloud>
    </main>
    <script src="../dist/opentagcloud.vanilla.js"></script>
  </body>
</html>
